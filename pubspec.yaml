name: coc
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  animate_do: ^3.3.4
  dio: ^5.5.0+1
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  font_awesome_flutter: ^10.7.0
  go_router: ^14.2.2
  google_sign_in: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/townhall/
    - .env

  fonts:
    - family: YouBlockhead
      fonts:
        - asset: assets/fonts/you-blockhead/YouBlockhead.ttf
          weight: 400
        - asset: assets/fonts/you-blockhead/YouBlockheadCaps.ttf
          weight: 700
        - asset: assets/fonts/you-blockhead/YouBlockheadCapsOpen.ttf
          weight: 500
    - family: YouBlockheadOpen
      fonts:
        - asset: assets/fonts/you-blockhead/YouBlockheadOpen.ttf
          weight: 400